name: client_project_tracker
description: A mobile app for tracking client projects at a digital agency.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  fpdart: ^1.1.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  drift_dev: ^2.19.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/test_data.json
